<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
    }

    .calc-container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      width: 340px;
    }

    .display {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 20px 25px;
      margin-bottom: 25px;
      text-align: right;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .display .expression {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #fff;
      font-size: 42px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      height: 65px;
      transition: all 0.15s ease;
      outline: none;
    }

    button:active {
      transform: scale(0.93);
    }

    /* Botones numéricos */
    .btn-num {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-num:hover {
      background: rgba(255,255,255,0.18);
    }

    /* Botones de operadores */
    .btn-op {
      background: rgba(100, 180, 255, 0.2);
      color: #64b4ff;
      border: 1px solid rgba(100, 180, 255, 0.2);
    }
    .btn-op:hover {
      background: rgba(100, 180, 255, 0.35);
    }

    /* Botón igual */
    .btn-eq {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-eq:hover {
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
      transform: translateY(-1px);
    }

    /* Botón AC / borrar */
    .btn-clear {
      background: rgba(255, 90, 90, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(255, 90, 90, 0.2);
    }
    .btn-clear:hover {
      background: rgba(255, 90, 90, 0.35);
    }

    /* Botón cero más ancho */
    .btn-zero {
      grid-column: span 2;
    }

    .calc-title {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="calc-container">
    <div class="calc-title">✦ Calculadora ✦</div>
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="deleteLast()">⌫</button>
      <button class="btn-op" onclick="appendOp('%')">%</button>
      <button class="btn-op" onclick="appendOp('/')">÷</button>

      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="appendOp('*')">×</button>

      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="appendOp('-')">−</button>

      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="appendOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let expression = '';
    let justCalculated = false;

    function updateDisplay() {
      const exprEl = document.getElementById('expression');
      const resultEl = document.getElementById('result');
      exprEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷');
      if (expression === '') {
        resultEl.textContent = '0';
      } else {
        try {
          let preview = eval(expression);
          if (!isNaN(preview) && isFinite(preview)) {
            resultEl.textContent = parseFloat(preview.toFixed(10)).toString();
          }
        } catch(e) {
          resultEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷');
        }
      }
    }

    function appendNum(num) {
      if (justCalculated) {
        expression = '';
        justCalculated = false;
      }
      expression += num;
      updateDisplay();
    }

    function appendOp(op) {
      justCalculated = false;
      if (expression === '' && op === '-') {
        expression = '-';
      } else if (expression !== '') {
        const last = expression[expression.length - 1];
        if (['+','-','*','/','%'].includes(last)) {
          expression = expression.slice(0, -1);
        }
        expression += op;
      }
      updateDisplay();
    }

    function appendDot() {
      if (justCalculated) { expression = '0'; justCalculated = false; }
      const parts = expression.split(/[\+\-\*\/]/);
      const last = parts[parts.length - 1];
      if (!last.includes('.')) {
        if (last === '') expression += '0';
        expression += '.';
      }
      updateDisplay();
    }

    function clearAll() {
      expression = '';
      justCalculated = false;
      document.getElementById('expression').textContent = '';
      document.getElementById('result').textContent = '0';
    }

    function deleteLast() {
      if (justCalculated) { clearAll(); return; }
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      if (expression === '') return;
      try {
        let res = eval(expression);
        if (!isFinite(res)) {
          document.getElementById('result').textContent = 'Error';
          expression = '';
          return;
        }
        res = parseFloat(res.toFixed(10));
        document.getElementById('expression').textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷') + ' =';
        document.getElementById('result').textContent = res.toString();
        expression = res.toString();
        justCalculated = true;
      } catch(e) {
        document.getElementById('result').textContent = 'Error';
        expression = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNum(e.key);
      else if (e.key === '+') appendOp('+');
      else if (e.key === '-') appendOp('-');
      else if (e.key === '*') appendOp('*');
      else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
      else if (e.key === '%') appendOp('%');
      else if (e.key === '.') appendDot();
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
